<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시크릿 AI 튜터 (스텔스 모드)</title>
    <style>
        /* 눈이 편안한 다크 모드 세팅 */
        body { background-color: #121212; color: #00ffcc; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        video { width: 100%; max-width: 400px; border: 2px solid #333; border-radius: 10px; margin-top: 20px; }
        canvas { display: none; } /* 화면 캡처용 도화지는 숨겨둠 */
        #status { font-size: 1.1rem; margin-top: 15px; font-weight: bold; line-height: 1.5; word-break: keep-all; }
    </style>
</head>
<body>

    <h2>🤫 시크릿 AI 튜터</h2>
    <p>카메라로 문제를 비추고 3초간 멈추세요.</p>
    
    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>
    
    <div id="status">👀 카메라 켜는 중...</div>

    <script>
        // ⚠️ 주의: 따옴표("") 안에 본인의 구글 Gemini API 키를 넣으세요!
        const API_KEY = "AIzaSyAsO4FSthGy-fmS6bVha5w9cBzKJQ1IFmg"; 
        
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const statusText = document.getElementById('status');
        const ctx = canvas.getContext('2d');

        let isSolving = false; 
        let stillTimer = 0;

        // 1. 태블릿/스마트폰 후면 카메라 켜기
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => {
                video.srcObject = stream;
                statusText.innerText = "✅ 준비 완료!\n문제에 시선을 고정하세요.";
                startMotionDetection(); // 카메라 켜지면 타이머 시작
            })
            .catch(err => {
                statusText.innerText = "❌ 카메라 권한을 허용해주세요!";
            });

        // 2. 3초 시선 고정 감지 (1초마다 카운트)
        function startMotionDetection() {
            setInterval(() => {
                if(isSolving) return; // 문제 푸는 중에는 타이머 멈춤

                stillTimer++;
                statusText.innerText = `⏱️ 고정 중... ${stillTimer}초`;

                if(stillTimer >= 3) {
                    statusText.innerText = "📸 캡처 완료!\nAI가 풀이를 시작합니다...";
                    captureAndSolve();
                }
            }, 1000); 
        }

        // 3. 사진 찍어서 Gemini에게 보내기
        async function captureAndSolve() {
            isSolving = true;
            stillTimer = 0;

            // 🌟 용량 초과 에러 방지: 이미지 폭을 최대 800px로 줄이고 화질 80%로 압축
            const MAX_WIDTH = 800;
            let scale = MAX_WIDTH / video.videoWidth;
            if (scale > 1) scale = 1; 
            
            canvas.width = video.videoWidth * scale;
            canvas.height = video.videoHeight * scale;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            let base64Image = canvas.toDataURL("image/jpeg", 0.8).split(',')[1];

            try {
                // Gemini 2.5 Flash 모델로 데이터 전송
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: "이 사진 속 문제의 정답과 핵심 이유를 2문장으로 짧게 한국어로 알려줘. 인사말 없이 바로 정답만 말해." },
                                { inlineData: { mimeType: "image/jpeg", data: base64Image } } 
                            ]
                        }]
                    })
                });

                // 에러 발생 시 상세 이유 잡아내기
                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error ? errorData.error.message : "알 수 없는 API 에러");
                }

                const data = await response.json();
                const answerText = data.candidates[0].content.parts[0].text;
                
                statusText.innerText = "💡 정답 수신 완료!\n(음성 재생 중)";
                speakAnswer(answerText); 

            } catch (error) {
                // 에러 메시지를 화면에 출력하고 5초 뒤 다시 시도
                statusText.innerText = `❌ 에러 발생:\n${error.message}`;
                setTimeout(() => { 
                    statusText.innerText = "✅ 다시 준비 완료!\n문제를 쳐다보세요.";
                    isSolving = false; 
                }, 5000); 
            }
        }

        // 4. 귓속말(TTS) 기능
        function speakAnswer(text) {
            console.log("AI 튜터 응답:", text);
            
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'ko-KR';
            utterance.rate = 1.1; // 약간 빠르게
            utterance.pitch = 0.5; // 조용히 말하는 느낌

            utterance.onend = () => {
                // 다 읽으면 3초 뒤에 새로운 문제 스캔 준비
                statusText.innerText = "✅ 준비 완료!\n다음 문제를 쳐다보세요.";
                setTimeout(() => { isSolving = false; }, 3000);
            };

            window.speechSynthesis.speak(utterance);
        }
    </script>
</body>
</html>
